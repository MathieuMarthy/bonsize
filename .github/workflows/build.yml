name: Build and Release

on:
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Install NSIS
        run: choco install nsis -y

      - name: Create NSIS installer script
        shell: pwsh
        run: |
          $version = "${{ github.event.release.tag_name }}"
          if (-not $version) { $version = "0.0.0" }
          $version = $version.TrimStart("v")
          @"
          !define APP_NAME "bonsize"
          !define APP_VERSION "$version"
          !define INSTALL_DIR "`$PROGRAMFILES64\bonsize"

          Name "`${APP_NAME} `${APP_VERSION}"
          OutFile "bonsize-installer.exe"
          InstallDir "`${INSTALL_DIR}"
          InstallDirRegKey HKLM "Software\bonsize" "Install_Dir"
          RequestExecutionLevel admin
          Icon "assets\icon.ico"
          UninstallIcon "assets\icon.ico"

          Section "Install"
            SetOutPath "`$INSTDIR"
            File "target\x86_64-pc-windows-msvc\release\bonsize.exe"
            File "assets\icon.ico"

            ; Add to PATH
            EnVar::AddValue "PATH" "`$INSTDIR"

            ; Write uninstaller
            WriteUninstaller "`$INSTDIR\uninstall.exe"

            ; Registry for Add/Remove Programs
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\bonsize" "DisplayName" "`${APP_NAME}"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\bonsize" "DisplayVersion" "`${APP_VERSION}"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\bonsize" "UninstallString" "`$INSTDIR\uninstall.exe"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\bonsize" "DisplayIcon" "`$INSTDIR\icon.ico"
          SectionEnd

          Section "Uninstall"
            Delete "`$INSTDIR\bonsize.exe"
            Delete "`$INSTDIR\icon.ico"
            Delete "`$INSTDIR\uninstall.exe"
            RMDir "`$INSTDIR"
            EnVar::DeleteValue "PATH" "`$INSTDIR"
            DeleteRegKey HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\bonsize"
            DeleteRegKey HKLM "Software\bonsize"
          SectionEnd
          "@ | Out-File -Encoding UTF8 installer.nsi

      - name: Install EnVar NSIS plugin
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://nsis.sourceforge.io/mediawiki/images/7/7f/EnVar_plugin.zip" -OutFile EnVar_plugin.zip
          Expand-Archive -Path EnVar_plugin.zip -DestinationPath EnVar_plugin
          Copy-Item -Path "EnVar_plugin\Plugins\x86-unicode\EnVar.dll" -Destination "C:\Program Files (x86)\NSIS\Plugins\x86-unicode\EnVar.dll"

      - name: Build installer
        shell: pwsh
        run: '& "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi'

      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: bonsize-installer.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux-deb:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build .deb package
        run: cargo deb --target x86_64-unknown-linux-gnu

      - name: Find .deb file
        id: find_deb
        run: echo "deb_path=$(find target/x86_64-unknown-linux-gnu/debian -name '*.deb' | head -1)" >> $GITHUB_OUTPUT

      - name: Upload .deb to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_deb.outputs.deb_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
